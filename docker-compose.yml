version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: growthai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: growthai_dev
    ports:
      - \"3306:3306\"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: growthai-redis
    ports:
      - \"6379:6379\"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: