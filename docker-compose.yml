services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: growthai_root
      MYSQL_DATABASE: GrowthAI
      MYSQL_USER: growthai
      MYSQL_PASSWORD: growthai_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  mysql_data:
